<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Alumno - CCSE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tu Panel de Estudio</h1>
            <div id="user-info"></div>
            <button id="logout-btn" class="btn btn-secondary">Cerrar Sesión</button>
        </header>
        <main>
            <h2>Elige un modo de práctica</h2>
            <div class="exam-modes">
                <button id="start-exam-btn" class="btn btn-primary">Simulacro de Examen Oficial</button>
                <p>25 preguntas aleatorias de todas las tareas.</p>
            </div>
            <div id="exam-history">
                <h3>Historial de Exámenes</h3>
                <ul id="exam-list"></ul>
            </div>
        </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
